services:
  app:
    environment:
      ALLOW_REGISTER: "true"
    user: root
    group_add:
      - "${DOCKER_GID:-972}"
    security_opt:
      - label=disable
    ports:
      - "1337:1337"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:Z
      - attachments_data:/app/attachments

  postgres:
    environment:
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    volumes:
      - redis_data_local:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  nginx:
    profiles:
      - disabled

  traefik:
    security_opt:
      - label=disable
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:Z

volumes:
  attachments_data:
  postgres_data_local:
  redis_data_local:
